<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0d10" />
  <title>Object Detector</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main>
    <div id="stage">
      <video id="video" playsinline muted autoplay></video>
      <canvas id="overlay"></canvas>
      <div id="status">Tap <b>Start</b> to begin</div>
      <div id="fps"></div>
      <div id="flash" aria-hidden="true"></div>
    </div>

    <div id="controls">
      <div id="model-picker" role="radiogroup" aria-label="Detection model">
        <label>
          <input type="radio" name="model" value="coco-ssd" checked />
          <span>COCO-SSD</span>
        </label>
        <label>
          <input type="radio" name="model" value="efficientdet-lite0" />
          <span>EfficientDet-Lite0</span>
        </label>
      </div>
      <div id="buttons">
        <button id="startBtn" type="button">Start</button>
        <button id="captureBtn" type="button" disabled>Capture</button>
        <button id="flipBtn" type="button" disabled>Flip</button>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3/dist/coco-ssd.min.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
